<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>台股開盤溢價追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bitcount+Prop+Single&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2230;
    --line: #2a3140;
    --ink: #e8edf4;
    --ink-dim: #8b97a8;
    --up: #ff4d4d;
    --down: #1ec77a;
    --gold: #f5b942;
    --accent: #4d9fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: "Noto Sans TC", sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 16px 40px;
    -webkit-text-size-adjust: 100%;
    background-image:
      radial-gradient(900px 400px at 85% -5%, rgba(77,159,255,.10), transparent),
      radial-gradient(700px 380px at 0% 100%, rgba(245,185,66,.07), transparent);
    background-attachment: fixed;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  header { padding: 26px 4px 18px; }
  .kicker {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: .32em;
    color: var(--ink-dim); text-transform: uppercase;
  }
  h1 {
    font-size: 27px; font-weight: 900; line-height: 1.18;
    margin-top: 6px; letter-spacing: -.01em;
  }
  h1 .mark { color: var(--gold); }
  .sub { color: var(--ink-dim); font-size: 13px; margin-top: 8px; }

  .search {
    display: flex; gap: 8px; margin-top: 18px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 7px;
  }
  .search input {
    flex: 1; background: transparent; border: 0; outline: 0;
    color: var(--ink); font-size: 17px; padding: 11px 12px;
    font-family: "Noto Sans TC", sans-serif;
  }
  .search input::placeholder { color: #5b6678; }
  .search button {
    background: var(--gold); color: #1a1205; border: 0;
    font-weight: 900; font-size: 15px; padding: 0 20px;
    border-radius: 9px; cursor: pointer; white-space: nowrap;
    font-family: "Noto Sans TC", sans-serif;
    transition: transform .08s ease, filter .15s ease;
  }
  .search button:active { transform: scale(.96); }
  .search button:disabled { filter: grayscale(1) brightness(.7); cursor: default; }

  .controls {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 0 2px;
  }
  .controls .lbl { font-size: 12px; color: var(--ink-dim); margin-right: 2px; }
  .seg {
    display: inline-flex; background: var(--panel);
    border: 1px solid var(--line); border-radius: 9px; overflow: hidden;
  }
  .seg button {
    background: transparent; border: 0; color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace; font-size: 13px;
    padding: 7px 14px; cursor: pointer;
  }
  .seg button.on { background: var(--accent); color: #04121f; font-weight: 700; }

  .hint {
    margin-top: 14px; font-size: 12px; color: #5b6678;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .hint span {
    background: var(--panel); border: 1px solid var(--line);
    padding: 4px 9px; border-radius: 999px; cursor: pointer;
  }
  .hint span:active { background: var(--panel-2); }

  #status { margin-top: 22px; text-align: center; color: var(--ink-dim); font-size: 14px; }
  .spin {
    width: 22px; height: 22px; margin: 0 auto 10px;
    border: 2px solid var(--line); border-top-color: var(--gold);
    border-radius: 50%; animation: r 0.7s linear infinite;
  }
  @keyframes r { to { transform: rotate(360deg); } }

  #result { margin-top: 22px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden;
    animation: rise .4s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

  .stockhead {
    padding: 18px 18px 16px;
    background:
      linear-gradient(180deg, var(--panel-2), var(--panel));
    border-bottom: 1px solid var(--line);
  }
  .stockhead .nm { font-size: 21px; font-weight: 900; }
  .stockhead .nm code {
    font-family: "JetBrains Mono", monospace; color: var(--gold);
    font-size: 17px; margin-left: 7px;
  }
  .stockhead .meta {
    font-size: 12px; color: var(--ink-dim); margin-top: 4px;
    font-family: "JetBrains Mono", monospace;
  }

  .intraday {
    margin: 14px 14px 0; padding: 14px;
    border: 1px dashed var(--line); border-radius: 12px;
    background: rgba(245,185,66,.045);
  }
  .intraday .tag {
    font-size: 11px; color: var(--gold); font-weight: 700;
    letter-spacing: .05em;
  }
  .bigprice {
    display: flex; align-items: baseline; gap: 10px; margin-top: 7px;
  }
  .bigprice .p {
    font-family: "JetBrains Mono", monospace;
    font-size: 33px; font-weight: 700; line-height: 1;
  }
  .bigprice .chg { font-size: 15px; font-weight: 700; }
  .intraday .row2 {
    display: flex; gap: 16px; margin-top: 8px;
    font-size: 12px; color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace;
  }
  .lock {
    display: inline-block; margin-left: 6px; font-size: 10px;
    background: var(--up); color: #fff; padding: 2px 6px;
    border-radius: 5px; vertical-align: middle; font-weight: 700;
  }

  .tablewrap { padding: 8px 6px 4px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 10px; color: var(--ink-dim); font-weight: 500;
    text-align: right; padding: 8px 8px; letter-spacing: .04em;
    border-bottom: 1px solid var(--line);
  }
  th:first-child { text-align: left; }
  td {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; text-align: right; padding: 9px 8px;
    border-bottom: 1px solid rgba(42,49,64,.5);
  }
  td:first-child { text-align: left; color: var(--ink-dim); }
  tr:last-child td { border-bottom: 0; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--ink-dim); }

  .actions { display: flex; gap: 8px; padding: 14px; }
  .actions button {
    flex: 1; padding: 13px 8px; border-radius: 11px;
    font-family: "Noto Sans TC", sans-serif; font-size: 14px;
    font-weight: 700; cursor: pointer; border: 1px solid var(--line);
    transition: transform .08s ease;
  }
  .actions button:active { transform: scale(.97); }
  .btn-line { background: #06c755; color: #fff; border-color: #06c755; }
  .btn-ai { background: var(--panel-2); color: var(--accent); }

  .foot {
    padding: 4px 18px 18px; font-size: 11px; color: #5b6678;
    line-height: 1.7; font-family: "JetBrains Mono", monospace;
  }
  .err {
    background: rgba(255,77,77,.08); border: 1px solid rgba(255,77,77,.3);
    color: #ff9b9b; padding: 14px 16px;
    border-radius: 12px; font-size: 14px; line-height: 1.6;
  }
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg); font-weight: 700;
    padding: 11px 20px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 9;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .pagefoot {
    text-align: center; margin-top: 26px;
    font-size: 11px; color: #4b5666; line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="kicker">TWSE · TPEX OFFICIAL</div>
    <h1>台股<span class="mark">開盤溢價</span>追蹤</h1>
    <div class="sub">輸入股票名稱或代號,查近 N 日開盤溢價、漲跌與量能</div>

    <div class="search">
      <input id="q" type="text" inputmode="text" autocomplete="off"
             placeholder="例如:2454 或 聯發科" />
      <button id="go">查詢</button>
    </div>

    <div class="controls">
      <span class="lbl">追蹤天數</span>
      <div class="seg" id="seg">
        <button data-d="10" class="on">10</button>
        <button data-d="20">20</button>
        <button data-d="30">30</button>
      </div>
    </div>

    <div class="hint" id="hint">
      <span>2330</span><span>2454</span><span>友達</span>
      <span>環球晶</span><span>世芯-KY</span>
    </div>
  </header>

  <div id="status"></div>
  <div id="result"></div>

  <div class="pagefoot">
    資料來源:台灣證券交易所 / 證券櫃檯買賣中心 官方端點<br />
    本工具僅作資料整理與呈現,不構成投資建議
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  var DAYS = 10;
  var lastData = null;

  var seg = document.getElementById("seg");
  seg.addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    DAYS = parseInt(b.dataset.d, 10);
    seg.querySelectorAll("button").forEach(function (x) { x.classList.remove("on"); });
    b.classList.add("on");
    if (lastData && lastData.stock) query(lastData.stock.code);
  });

  document.getElementById("hint").addEventListener("click", function (e) {
    if (e.target.tagName === "SPAN") {
      document.getElementById("q").value = e.target.textContent;
      query(e.target.textContent);
    }
  });
  document.getElementById("go").addEventListener("click", function () {
    query(document.getElementById("q").value);
  });
  document.getElementById("q").addEventListener("keydown", function (e) {
    if (e.key === "Enter") query(this.value);
  });

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  function fmtVol(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + "萬";
    return n.toLocaleString("en-US");
  }
  function cls(v) {
    if (v === null || v === undefined || Math.abs(v) < 0.005) return "flat";
    return v > 0 ? "up" : "down";
  }
  function sign(v) {
    if (v === null || v === undefined) return "—";
    return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
  }
  function mark(v) {
    if (v === null || v === undefined || Math.abs(v) < 0.005) return "";
    return v > 0 ? "🔴" : "🟢";
  }
  function md(iso) { return iso.slice(5).replace("-", "/"); }

  async function query(raw) {
    var q = (raw || "").trim();
    if (!q) { toast("請輸入股票名稱或代號"); return; }
    var btn = document.getElementById("go");
    btn.disabled = true;
    document.getElementById("result").innerHTML = "";
    document.getElementById("status").innerHTML =
      '<div class="spin"></div>抓取官方資料中…';
    try {
      var res = await fetch(
        "/api/stock?q=" + encodeURIComponent(q) + "&days=" + DAYS
      );
      var data = await res.json();
      document.getElementById("status").innerHTML = "";
      if (data.error) {
        document.getElementById("result").innerHTML =
          '<div class="err">' + data.error + "</div>";
        return;
      }
      lastData = data;
      render(data);
    } catch (e) {
      document.getElementById("status").innerHTML = "";
      document.getElementById("result").innerHTML =
        '<div class="err">連線失敗,請稍後再試。' +
        "(若剛部署,請稍候片刻待伺服器啟動)</div>";
    } finally {
      btn.disabled = false;
    }
  }

  function render(d) {
    var s = d.stock, iz = d.intraday || {};
    var h = '<div class="card">';

    h += '<div class="stockhead"><div class="nm">' + s.name +
         "<code>" + s.code + "</code></div>" +
         '<div class="meta">' + s.market + " ｜ 近 " + d.daily.length + " 日</div></div>";

    if (iz.hasQuote) {
      h += '<div class="intraday"><div class="tag">⚠ 盤中即時 ' +
           (iz.time || "").slice(0, 5) + "</div>" +
           '<div class="bigprice"><span class="p ' + cls(iz.changePct) + '">' +
           (iz.price != null ? iz.price.toFixed(2) : "—") + "</span>" +
           '<span class="chg ' + cls(iz.changePct) + '">' + sign(iz.changePct) +
           (iz.limitLocked ? '<span class="lock">漲停鎖死</span>' : "") +
           "</span></div>" +
           '<div class="row2"><span>開 ' +
           (iz.open != null ? iz.open.toFixed(2) : "—") +
           " ｜ 溢價 " + sign(iz.premiumPct) + "</span>" +
           "<span>量 " + fmtVol(iz.volumeLots || 0) + "張</span></div></div>";
    }

    h += '<div class="tablewrap"><table><thead><tr>' +
         "<th>日期</th><th>開盤</th><th>溢價%</th>" +
         "<th>收盤</th><th>漲跌%</th><th>量(張)</th>" +
         "</tr></thead><tbody>";
    d.daily.forEach(function (r) {
      h += "<tr><td>" + md(r.date) + "</td>" +
           "<td>" + (r.open != null ? r.open.toFixed(2) : "—") + "</td>" +
           '<td class="' + cls(r.premiumPct) + '">' + sign(r.premiumPct) + "</td>" +
           "<td>" + (r.close != null ? r.close.toFixed(2) : "—") + "</td>" +
           '<td class="' + cls(r.changePct) + '">' + sign(r.changePct) + "</td>" +
           "<td>" + fmtVol(r.volumeLots || 0) + "</td></tr>";
    });
    h += "</tbody></table></div>";

    h += '<div class="actions">' +
         '<button class="btn-line" id="cpLine">📋 複製 LINE 版面</button>' +
         '<button class="btn-ai" id="cpAI">🤖 打包給 AI 點評</button></div>';

    h += '<div class="foot">📐 溢價%=(今開−昨收)/昨收　📐 漲跌%=(今收−昨收)/昨收<br />' +
         "📡 " + d.source + "　🔴漲 🟢跌<br />" +
         (iz.hasQuote ? "⚠ 盤中列為即時快照,收盤後可再查核對" : "") +
         "</div>";

    h += "</div>";
    document.getElementById("result").innerHTML = h;

    document.getElementById("cpLine").addEventListener("click", function () {
      copy(buildLine(d), "已複製 LINE 版面");
    });
    document.getElementById("cpAI").addEventListener("click", function () {
      copy(buildAI(d), "已複製,貼到 AI App 即可");
    });
  }

  function buildLine(d) {
    var s = d.stock, iz = d.intraday || {};
    var bar = "━━━━━━━━━━━━━━━━━━━━";
    var sep = "────────────────────";
    var L = [bar, "📊 " + s.name + "(" + s.code + ")開盤溢價追蹤",
             "🏛 " + s.market + " ｜ 近 " + d.daily.length + " 日", bar];
    if (iz.hasQuote) {
      L.push("📅 盤中 ⚠️ " + (iz.time || "").slice(0, 5));
      L.push("開盤 " + iz.open.toFixed(2) + "  溢價 " +
             sign(iz.premiumPct) + mark(iz.premiumPct));
      L.push("現價 " + iz.price.toFixed(2) + "  漲跌 " +
             sign(iz.changePct) + mark(iz.changePct));
      L.push("量 " + fmtVol(iz.volumeLots || 0) + "張" +
             (iz.limitLocked ? "(漲停鎖死)" : ""));
      L.push(sep);
    }
    d.daily.forEach(function (r) {
      L.push("📅 " + md(r.date));
      L.push("開盤 " + (r.open != null ? r.open.toFixed(2) : "—") +
             "  溢價 " + sign(r.premiumPct) + mark(r.premiumPct));
      L.push("收盤 " + (r.close != null ? r.close.toFixed(2) : "—") +
             "  漲跌 " + sign(r.changePct) + mark(r.changePct));
      L.push("量 " + fmtVol(r.volumeLots || 0) + "張");
      L.push(sep);
    });
    L.push("📐 溢價%=(今開−昨收)/昨收");
    L.push("📐 漲跌%=(今收−昨收)/昨收");
    L.push("📡 資料:TWSE / TPEX 官方");
    if (iz.hasQuote) L.push("⚠️ 盤中列為即時快照,收盤後可再查核對");
    L.push(bar);
    return L.join("\n");
  }

  function buildAI(d) {
    var s = d.stock;
    var head = "以下是「" + s.name + "(" + s.code + ")」近 " +
      d.daily.length + " 日的開盤溢價追蹤資料(TWSE/TPEX 官方)。" +
      "請用專業但中立的角度,評論它的漲跌趨勢,並提醒這非投資建議。\n\n";
    return head + buildLine(d);
  }

  function copy(text, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { toast(okMsg); },
        function () { fallbackCopy(text, okMsg); }
      );
    } else {
      fallbackCopy(text, okMsg);
    }
  }
  function fallbackCopy(text, okMsg) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast(okMsg); }
    catch (e) { toast("複製失敗,請手動選取"); }
    document.body.removeChild(ta);
  }
</script>
</body>
</html>
