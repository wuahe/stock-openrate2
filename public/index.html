<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>台股開盤溢價追蹤</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Bitcount+Prop+Single&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #0e1116;
    --panel: #161b22;
    --panel-2: #1c2230;
    --line: #2a3140;
    --ink: #e8edf4;
    --ink-dim: #8b97a8;
    --up: #ff4d4d;
    --down: #1ec77a;
    --gold: #f5b942;
    --accent: #4d9fff;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { background: var(--bg); }
  body {
    font-family: "Noto Sans TC", sans-serif;
    color: var(--ink);
    min-height: 100vh;
    padding: env(safe-area-inset-top) 16px 40px;
    -webkit-text-size-adjust: 100%;
    background-image:
      radial-gradient(900px 400px at 85% -5%, rgba(77,159,255,.10), transparent),
      radial-gradient(700px 380px at 0% 100%, rgba(245,185,66,.07), transparent);
    background-attachment: fixed;
  }
  .wrap { max-width: 560px; margin: 0 auto; }

  header { padding: 26px 4px 18px; }
  .kicker {
    font-family: "JetBrains Mono", monospace;
    font-size: 11px; letter-spacing: .32em;
    color: var(--ink-dim); text-transform: uppercase;
  }
  h1 {
    font-size: 27px; font-weight: 900; line-height: 1.18;
    margin-top: 6px; letter-spacing: -.01em;
  }
  h1 .mark { color: var(--gold); }
  .sub { color: var(--ink-dim); font-size: 13px; margin-top: 8px; }

  .search {
    display: flex; gap: 8px; margin-top: 18px;
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 14px; padding: 7px;
  }
  .search input {
    flex: 1; min-width: 0; width: 100%;
    background: transparent; border: 0; outline: 0;
    color: var(--ink); font-size: 16px; padding: 11px 12px;
    font-family: "Noto Sans TC", sans-serif;
  }
  .search input::placeholder { color: #5b6678; }
  .search button {
    background: var(--gold); color: #1a1205; border: 0;
    font-weight: 900; font-size: 15px; padding: 0 20px;
    border-radius: 9px; cursor: pointer; white-space: nowrap;
    font-family: "Noto Sans TC", sans-serif;
    transition: transform .08s ease, filter .15s ease;
  }
  .search button:active { transform: scale(.96); }
  .search button:disabled { filter: grayscale(1) brightness(.7); cursor: default; }

  .controls {
    display: flex; align-items: center; gap: 6px;
    margin-top: 12px; padding: 0 2px;
  }
  .controls .lbl { font-size: 12px; color: var(--ink-dim); margin-right: 2px; }
  .seg {
    display: inline-flex; background: var(--panel);
    border: 1px solid var(--line); border-radius: 9px; overflow: hidden;
  }
  .seg button {
    background: transparent; border: 0; color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace; font-size: 13px;
    padding: 7px 11px; cursor: pointer;
  }
  .seg button.on { background: var(--accent); color: #04121f; font-weight: 700; }

  .hint {
    margin-top: 14px; font-size: 12px; color: #5b6678;
    display: flex; flex-wrap: wrap; gap: 6px;
  }
  .hint span {
    background: var(--panel); border: 1px solid var(--line);
    padding: 4px 9px; border-radius: 999px; cursor: pointer;
  }
  .hint span:active { background: var(--panel-2); }

  #status { margin-top: 22px; text-align: center; color: var(--ink-dim); font-size: 14px; }
  .spin {
    width: 22px; height: 22px; margin: 0 auto 10px;
    border: 2px solid var(--line); border-top-color: var(--gold);
    border-radius: 50%; animation: r 0.7s linear infinite;
  }
  @keyframes r { to { transform: rotate(360deg); } }

  #result { margin-top: 22px; }
  .card {
    background: var(--panel); border: 1px solid var(--line);
    border-radius: 16px; overflow: hidden;
    animation: rise .4s ease both;
  }
  @keyframes rise { from { opacity: 0; transform: translateY(10px); } }

  .stockhead {
    padding: 18px 18px 16px;
    background:
      linear-gradient(180deg, var(--panel-2), var(--panel));
    border-bottom: 1px solid var(--line);
  }
  .stockhead .nm { font-size: 21px; font-weight: 900; }
  .stockhead .nm code {
    font-family: "JetBrains Mono", monospace; color: var(--gold);
    font-size: 17px; margin-left: 7px;
  }
  .stockhead .meta {
    font-size: 12px; color: var(--ink-dim); margin-top: 4px;
    font-family: "JetBrains Mono", monospace;
  }
  .quote-link {
    margin: 12px 14px 0; font-size: 12px;
    color: var(--ink-dim); line-height: 1.5;
    word-break: break-all;
  }
  .quote-link a {
    color: var(--gold); text-decoration: none;
    font-family: "JetBrains Mono", monospace;
  }
  .quote-link a:hover { text-decoration: underline; }

  .intraday {
    margin: 14px 14px 0; padding: 14px;
    border: 1px dashed var(--line); border-radius: 12px;
    background: rgba(245,185,66,.045);
  }
  .intraday .tag {
    font-size: 11px; color: var(--gold); font-weight: 700;
    letter-spacing: .05em;
  }
  .bigprice {
    display: flex; align-items: baseline; gap: 10px; margin-top: 7px;
  }
  .bigprice .p {
    font-family: "JetBrains Mono", monospace;
    font-size: 33px; font-weight: 700; line-height: 1;
  }
  .bigprice .chg { font-size: 15px; font-weight: 700; }
  .intraday .row2 {
    display: flex; gap: 16px; margin-top: 8px;
    font-size: 12px; color: var(--ink-dim);
    font-family: "JetBrains Mono", monospace;
  }
  .lock {
    display: inline-block; margin-left: 6px; font-size: 10px;
    background: var(--up); color: #fff; padding: 2px 6px;
    border-radius: 5px; vertical-align: middle; font-weight: 700;
  }
  .lock.down { background: var(--down); }

  .tablewrap { padding: 8px 6px 4px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  th {
    font-size: 10px; color: var(--ink-dim); font-weight: 500;
    text-align: right; padding: 8px 8px; letter-spacing: .04em;
    border-bottom: 1px solid var(--line);
  }
  th:first-child { text-align: left; }
  td {
    font-family: "JetBrains Mono", monospace;
    font-size: 13px; text-align: right; padding: 9px 8px;
    border-bottom: 1px solid rgba(42,49,64,.5);
  }
  td:first-child { text-align: left; color: var(--ink-dim); }
  tr:last-child td { border-bottom: 0; }
  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--ink-dim); }

  .actions { display: flex; gap: 8px; padding: 14px; }
  .actions button {
    flex: 1; padding: 13px 8px; border-radius: 11px;
    font-family: "Noto Sans TC", sans-serif; font-size: 14px;
    font-weight: 700; cursor: pointer; border: 1px solid var(--line);
    transition: transform .08s ease;
  }
  .actions button:active { transform: scale(.97); }
  .btn-line { background: #06c755; color: #fff; border-color: #06c755; }
  .btn-ai { background: var(--accent); color: #04121f; border-color: var(--accent); }

  .foot {
    padding: 4px 18px 18px; font-size: 11px; color: #5b6678;
    line-height: 1.7; font-family: "JetBrains Mono", monospace;
  }
  .err {
    background: rgba(255,77,77,.08); border: 1px solid rgba(255,77,77,.3);
    color: #ff9b9b; padding: 14px 16px;
    border-radius: 12px; font-size: 14px; line-height: 1.6;
  }
  .toast {
    position: fixed; left: 50%; bottom: 30px; transform: translateX(-50%) translateY(20px);
    background: var(--ink); color: var(--bg); font-weight: 700;
    padding: 11px 20px; border-radius: 999px; font-size: 13px;
    opacity: 0; pointer-events: none; transition: all .25s ease; z-index: 9;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .pagefoot {
    text-align: center; margin-top: 26px;
    font-size: 11px; color: #4b5666; line-height: 1.7;
  }
</style>
</head>
<body>
<div class="wrap">
  <div style="display:flex;gap:12px;padding:12px 4px 0;font-size:12px">
    <a href="/" style="color:var(--ink);text-decoration:none;padding:6px 10px;border-radius:8px;border:1px solid var(--gold);background:var(--panel)">上市櫃</a>
    <a href="/emerging" style="color:var(--ink-dim);text-decoration:none;padding:6px 10px;border-radius:8px;border:1px solid var(--line)">興櫃</a>
  </div>
  <header>
    <div class="kicker">TWSE · TPEX OFFICIAL</div>
    <h1>台股<span class="mark">開盤溢價</span>追蹤</h1>
    <div class="sub">輸入股票名稱或代號,查近 N 日開盤溢價、漲跌與量能</div>

    <div class="search">
      <input id="q" type="text" inputmode="text" autocomplete="off"
             placeholder="例如:2454 或 聯發科" />
      <button id="go">查詢</button>
    </div>

    <div class="controls">
      <span class="lbl">追蹤天數</span>
      <div class="seg" id="seg">
        <button data-d="10" class="on">10</button>
        <button data-d="20">20</button>
        <button data-d="30">30</button>
        <button data-d="40">40</button>
        <button data-d="50">50</button>
        <button data-d="60">60</button>
      </div>
    </div>

    <div class="hint" id="hint">
      <span>2330</span><span>2454</span><span>友達</span>
      <span>健亞</span><span>世芯-KY</span>
    </div>
  </header>

  <div id="status"></div>
  <div id="result"></div>

  <div class="pagefoot">
    資料來源:歷史日線與個股清單為台灣證券交易所 / 證券櫃檯買賣中心官方端點;盤中即時現價為 Yahoo 台股<br />
    本工具僅作資料整理與呈現,不構成投資建議
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
  var DAYS = 10;
  var lastData = null;

  var seg = document.getElementById("seg");
  seg.addEventListener("click", function (e) {
    var b = e.target.closest("button");
    if (!b) return;
    DAYS = parseInt(b.dataset.d, 10);
    seg.querySelectorAll("button").forEach(function (x) { x.classList.remove("on"); });
    b.classList.add("on");
    if (lastData && lastData.stock) query(lastData.stock.code);
  });

  document.getElementById("hint").addEventListener("click", function (e) {
    if (e.target.tagName === "SPAN") {
      document.getElementById("q").value = e.target.textContent;
      query(e.target.textContent);
    }
  });
  document.getElementById("go").addEventListener("click", function () {
    query(document.getElementById("q").value);
  });
  document.getElementById("q").addEventListener("keydown", function (e) {
    if (e.key === "Enter") query(this.value);
  });

  function toast(msg) {
    var t = document.getElementById("toast");
    t.textContent = msg;
    t.classList.add("show");
    setTimeout(function () { t.classList.remove("show"); }, 1900);
  }

  function fmtVol(n) {
    if (n >= 10000) return (n / 10000).toFixed(1) + "萬";
    return n.toLocaleString("en-US");
  }
  function cls(v) {
    if (v === null || v === undefined || Math.abs(v) < 0.005) return "flat";
    return v > 0 ? "up" : "down";
  }
  function sign(v) {
    if (v === null || v === undefined) return "—";
    return (v > 0 ? "+" : "") + v.toFixed(2) + "%";
  }
  function mark(v) {
    if (v === null || v === undefined || Math.abs(v) < 0.005) return "";
    return v > 0 ? "🔴" : "🟢";
  }
  function md(iso) { return iso.slice(5).replace("-", "/"); }

  // 是否處於台股盤中(以台北時間判斷,週一至週五 09:00–13:30)
  function inTwSession() {
    var now = new Date();
    var wd = now.toLocaleDateString("en-US", {
      timeZone: "Asia/Taipei", weekday: "short"
    });
    if (wd === "Sat" || wd === "Sun") return false;
    var hms = now.toLocaleTimeString("en-GB", {
      timeZone: "Asia/Taipei", hour12: false
    });
    var mins = parseInt(hms.slice(0, 2), 10) * 60 + parseInt(hms.slice(3, 5), 10);
    return mins >= 540 && mins < 810;
  }

  // 台北時間的今日 YYYY-MM-DD
  function twToday() {
    var p = {};
    new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Taipei",
      year: "numeric", month: "2-digit", day: "2-digit"
    }).formatToParts(new Date()).forEach(function (x) { p[x.type] = x.value; });
    return p.year + "-" + p.month + "-" + p.day;
  }

  function isTodayQuote(iz) {
    return !!(iz && iz.quoteDate && iz.quoteDate === twToday());
  }

  function quoteStamp(iz) {
    var t = (iz.time || "").slice(0, 5);
    if (!iz.quoteDate) return t;
    return (isTodayQuote(iz) ? "" : md(iz.quoteDate) + " ") + t;
  }

  // 盤中或當日歷史尚未發佈時,把 intraday 合成成「今天」這列接到 daily 最前面
  // 只有報價日期確定是台北今天才插入,避免上游回舊快照時被誤標成當日行情
  function withTodayRow(d) {
    var iz = d.intraday || {};
    if (iz.open === null || iz.open === undefined) return d.daily;
    if (iz.prevClose === null || iz.prevClose === undefined) return d.daily;
    if (!isTodayQuote(iz)) return d.daily;
    var today = twToday();
    if (d.daily.length && d.daily[0].date === today) return d.daily;
    // 收盤欄只能放即時成交價;不可拿 high 當收(那是當日最高,會把 +0.69% 寫成 +7.34%)
    // 即時源缺價時,close 與漲跌% 一起留空,讓表格顯示 —,使用者仍看得到開盤+溢價%
    var closeVal = (iz.price === null || iz.price === undefined) ? null : iz.price;
    var changePct = (iz.changePct === null || iz.changePct === undefined) ? null : iz.changePct;
    var row = {
      date: today,
      open: iz.open,
      high: iz.high,
      low: iz.low,
      close: closeVal,
      volumeLots: iz.volumeLots || 0,
      prevClose: iz.prevClose,
      premiumPct: iz.premiumPct,
      changePct: changePct,
      _intraday: true
    };
    return [row].concat(d.daily);
  }

  // 把 ISO 時間(或現在)格式化為台北時間 MM/DD HH:MM
  function twClock(iso) {
    var d = iso ? new Date(iso) : new Date();
    var p = {};
    new Intl.DateTimeFormat("en-GB", {
      timeZone: "Asia/Taipei", hour12: false,
      month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit"
    }).formatToParts(d).forEach(function (x) { p[x.type] = x.value; });
    return p.month + "/" + p.day + " " + p.hour + ":" + p.minute;
  }

  async function query(raw) {
    var q = (raw || "").trim();
    if (!q) { toast("請輸入股票名稱或代號"); return; }
    var btn = document.getElementById("go");
    btn.disabled = true;
    document.getElementById("result").innerHTML = "";
    document.getElementById("status").innerHTML =
      '<div class="spin"></div>抓取官方資料中…';
    try {
      var res = await fetch(
        "/api/stock?q=" + encodeURIComponent(q) + "&days=" + DAYS
      );
      var data = await res.json();
      document.getElementById("status").innerHTML = "";
      if (data.error) {
        // 用 textContent 避免 XSS:錯誤訊息會包含使用者輸入的代號/名稱
        var errBox = document.createElement("div");
        errBox.className = "err";
        errBox.textContent = data.error;
        var rb = document.getElementById("result");
        rb.innerHTML = "";
        rb.appendChild(errBox);
        return;
      }
      lastData = data;
      render(data);
    } catch (e) {
      document.getElementById("status").innerHTML = "";
      document.getElementById("result").innerHTML =
        '<div class="err">連線失敗,請稍後再試。' +
        "(若剛部署,請稍候片刻待伺服器啟動)</div>";
    } finally {
      btn.disabled = false;
    }
  }

  // 防 XSS:後端字串(個股名稱、市場別、source 等)即使來自官方 API,
  // 拼進 innerHTML 前一律 escape,避免上游若被污染就在使用者瀏覽器執行
  function esc(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  // 安全的數字格式化:給 buildLine / render 統一使用,避免 null.toFixed 崩潰
  function fmt2(n) {
    return (n == null || !isFinite(n)) ? "—" : Number(n).toFixed(2);
  }

  function yahooQuoteUrl(s) {
    var suffix = s.market === "上櫃" ? "TWO" : "TW";
    return "https://tw.stock.yahoo.com/quote/" + encodeURIComponent(s.code + "." + suffix);
  }

  function render(d) {
    var s = d.stock, iz = d.intraday || {};
    var quoteIsToday = isTodayQuote(iz);
    var live = quoteIsToday && inTwSession();
    var h = '<div class="card">';

    h += '<div class="stockhead"><div class="nm">' + esc(s.name) +
         "<code>" + esc(s.code) + "</code></div>" +
         '<div class="meta">' + esc(s.market) + " ｜ 近 " + d.daily.length + " 日</div></div>";

    var yahooUrl = yahooQuoteUrl(s);
    h += '<div class="quote-link">Yahoo 股價：<a href="' + esc(yahooUrl) +
         '" target="_blank" rel="noopener noreferrer">' + esc(yahooUrl) + "</a></div>";

    // 盤中即時方塊的顯示條件與表格今日列同步,避免「有今日列卻沒方塊」的視覺斷層
    // 條件:有 hasQuote(即時成交價)、或有開盤+昨收+今日標記(可算溢價)
    var showIntraday = iz.hasQuote ||
        (iz.open !== null && iz.open !== undefined &&
         iz.prevClose !== null && iz.prevClose !== undefined &&
         quoteIsToday);
    if (showIntraday) {
      h += '<div class="intraday"><div class="tag">' +
           (quoteIsToday ? (live ? "⚠ 盤中即時 " : "🏁 當日行情 ") : "↺ 最近行情 ") +
           esc(quoteStamp(iz)) + (iz.stale ? " · 快取" : "") + "</div>" +
           '<div class="bigprice"><span class="p ' + cls(iz.changePct) + '">' +
           fmt2(iz.price) + "</span>" +
           '<span class="chg ' + cls(iz.changePct) + '">' + sign(iz.changePct) +
           (iz.limitLocked
             ? '<span class="lock ' + (iz.limitDir === "down" ? "down" : "up") + '">' +
               (iz.limitDir === "down" ? "跌停鎖死" : "漲停鎖死") + "</span>"
             : "") +
           "</span></div>" +
           '<div class="row2"><span>開 ' + fmt2(iz.open) +
           ' ｜ 溢價 <span class="' + cls(iz.premiumPct) + '">' +
           sign(iz.premiumPct) + "</span></span>" +
           "<span>量 " + fmtVol(iz.volumeLots || 0) + "張</span></div></div>";
    }

    var rows = withTodayRow(d);
    h += '<div class="tablewrap"><table><thead><tr>' +
         "<th>日期</th><th>開盤</th><th>溢價%</th>" +
         "<th>漲跌%</th><th>收盤</th><th>量(張)</th>" +
         "</tr></thead><tbody>";
    rows.forEach(function (r) {
      h += "<tr><td>" + esc(md(r.date)) +
           (r._intraday ? (live ? " ⚠" : " 🏁") : "") + "</td>" +
           "<td>" + fmt2(r.open) + "</td>" +
           '<td class="' + cls(r.premiumPct) + '">' + sign(r.premiumPct) + "</td>" +
           '<td class="' + cls(r.changePct) + '">' + sign(r.changePct) + "</td>" +
           "<td>" + fmt2(r.close) + "</td>" +
           "<td>" + fmtVol(r.volumeLots || 0) + "</td></tr>";
    });
    h += "</tbody></table></div>";

    h += '<div class="actions">' +
         '<button class="btn-line" id="cpLine">📋 複製 LINE 版面</button>' +
         '<button class="btn-ai" id="cpAI">🤖 打包給 AI 點評</button></div>';

    h += '<div class="foot">📐 溢價%=(今開−昨收)/昨收　📐 漲跌%=(今收−昨收)/昨收<br />' +
         "📡 " + esc(d.source) + "　🔴漲 🟢跌<br />" +
         "🕒 查詢時間 " + esc(twClock(d.fetchedAt)) + "(台北)" +
         (iz.hasQuote && live ? "<br />⚠ 盤中為即時快照,收盤後可再查核對" : "") +
         (iz.hasQuote && iz.quoteDate && !quoteIsToday ? "<br />ℹ 即時源目前回傳最近交易日,未補入今日列" : "") +
         "</div>";

    h += "</div>";
    document.getElementById("result").innerHTML = h;

    document.getElementById("cpLine").addEventListener("click", function () {
      copy(buildLine(d), "已複製 LINE 版面");
    });
    document.getElementById("cpAI").addEventListener("click", function () {
      copy(buildAI(d), "已複製,貼到 AI App 即可");
    });
  }

  function buildLine(d, sepLen) {
    var s = d.stock, iz = d.intraday || {};
    var quoteIsToday = isTodayQuote(iz);
    var live = quoteIsToday && inTwSession();
    var n = sepLen || 11;
    var bar = "━".repeat(n);
    var sep = "─".repeat(n);
    var L = [bar, "📊 " + s.name + "(" + s.code + ")開盤溢價追蹤",
             "🏛 " + s.market + " ｜ 近 " + d.daily.length + " 日", bar];
    // 盤中區塊條件與畫面 render 同步:有 hasQuote、或有開盤+昨收+今日標記
    // 修正:z 短暫為空時,畫面已能顯示今日列,但複製出去的 LINE 卻漏掉
    var lineShowIntraday = iz.hasQuote ||
        (iz.open !== null && iz.open !== undefined &&
         iz.prevClose !== null && iz.prevClose !== undefined &&
         quoteIsToday);
    if (lineShowIntraday) {
      L.push("📅 " + (quoteIsToday ? (live ? "盤中 ⚠️ " : "當日行情 ") : "最近行情 ") + quoteStamp(iz));
      // 用 fmt2 避免 iz.open/iz.price 為 null 時 .toFixed 拋 TypeError
      L.push("開盤 " + fmt2(iz.open) + "  溢價 " +
             sign(iz.premiumPct) + mark(iz.premiumPct));
      L.push((live ? "現價 " : "收盤 ") + fmt2(iz.price) + "  漲跌 " +
             sign(iz.changePct) + mark(iz.changePct));
      L.push("量 " + fmtVol(iz.volumeLots || 0) + "張" +
             (iz.limitLocked ? (iz.limitDir === "down" ? "(跌停鎖死)" : "(漲停鎖死)") : ""));
      L.push(sep);
    }
    d.daily.forEach(function (r) {
      L.push("📅 " + md(r.date));
      L.push("開盤 " + fmt2(r.open) +
             "  溢價 " + sign(r.premiumPct) + mark(r.premiumPct));
      L.push("收盤 " + fmt2(r.close) +
             "  漲跌 " + sign(r.changePct) + mark(r.changePct));
      L.push("量 " + fmtVol(r.volumeLots || 0) + "張");
      L.push(sep);
    });
    L.push("📐 溢價%=(今開−昨收)/昨收");
    L.push("📐 漲跌%=(今收−昨收)/昨收");
    L.push("📡 資料:TWSE / TPEX 官方(盤中即時:Yahoo 台股)");
    L.push("🕒 查詢時間 " + twClock(d.fetchedAt) + "(台北)");
    if (iz.hasQuote && live) L.push("⚠️ 盤中為即時快照,收盤後可再查核對");
    if (iz.hasQuote && iz.quoteDate && !quoteIsToday) L.push("ℹ 即時源目前回傳最近交易日,未補入今日列");
    L.push(bar);
    return L.join("\n");
  }

  function buildAI(d) {
    var s = d.stock;
    var head = "你是一位專業的股票分析師。先給接下來這幾天該如何操作的建議,然後再做分析及未來的展望。\n" +
      "以下是「" + s.name + "(" + s.code + ")」近 " +
      d.daily.length + " 日的開盤溢價追蹤資料(歷史為 TWSE/TPEX 官方、盤中即時現價為 Yahoo 台股)。" +
      "請用專業但中立的角度,評論它的漲跌趨勢,並提醒這非投資建議。\n\n";
    return head + buildLine(d, 8);
  }

  function copy(text, okMsg) {
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(
        function () { toast(okMsg); },
        function () { fallbackCopy(text, okMsg); }
      );
    } else {
      fallbackCopy(text, okMsg);
    }
  }
  function fallbackCopy(text, okMsg) {
    var ta = document.createElement("textarea");
    ta.value = text;
    ta.style.position = "fixed";
    ta.style.opacity = "0";
    document.body.appendChild(ta);
    ta.select();
    try { document.execCommand("copy"); toast(okMsg); }
    catch (e) { toast("複製失敗,請手動選取"); }
    document.body.removeChild(ta);
  }
</script>
</body>
